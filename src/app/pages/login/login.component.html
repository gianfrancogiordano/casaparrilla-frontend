<div class="d-flex align-items-center justify-content-center vh-100" style="background: linear-gradient(135deg, #f5f5f5 0%, #eeeeee 100%);">
  <div class="card shadow-lg border-0 rounded-4 mx-3" style="max-width: 420px; width: 100%;">
    <div class="card-body p-4 p-md-5">

      <!-- Logo / Título -->
      <div class="text-center mb-4">
        <div class="mb-3">
          <span style="font-size: 3rem;">🔥</span>
        </div>
        <h2 class="fw-bold mb-1 text-dark">Casa <span class="text-gradient">Parrilla</span></h2>
        <p class="text-muted small mb-0">Ingresa tus credenciales para continuar</p>
      </div>

      <!-- Alerta de Error -->
      <div *ngIf="errorMessage" class="alert alert-danger rounded-3 d-flex align-items-center py-2 px-3 mb-3" role="alert">
        <span class="me-2">⚠️</span>
        <small>{{ errorMessage }}</small>
      </div>

      <!-- Formulario -->
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>

        <!-- Usuario Input -->
        <div class="form-floating mb-3">
          <input
            type="text"
            class="form-control rounded-3"
            id="loginName"
            placeholder="Usuario"
            formControlName="name"
            [class.is-invalid]="loginForm.get('name')?.invalid && loginForm.get('name')?.touched"
          >
          <label for="loginName">Usuario</label>
          <div class="invalid-feedback">Ingresa un usuario válido (mínimo 3 caracteres).</div>
        </div>

        <!-- Password Input -->
        <div class="form-floating mb-4">
          <input
            type="password"
            class="form-control rounded-3"
            id="loginPassword"
            placeholder="Contraseña"
            formControlName="password"
            [class.is-invalid]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
          >
          <label for="loginPassword">Contraseña</label>
          <div class="invalid-feedback">Ingresa tu contraseña (mínimo 6 caracteres).</div>
        </div>

        <!-- Botón de Login -->
        <button
          id="btn-login"
          class="btn btn-premium w-100 py-2 rounded-3 mb-3 fw-bold shadow-sm"
          type="submit"
          [disabled]="isLoading"
        >
          <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
          <span>{{ isLoading ? 'Iniciando sesión...' : 'Iniciar Sesión' }}</span>
        </button>
      </form>

      <div class="text-center mt-2">
        <a href="#" class="text-decoration-none small text-muted">¿Olvidaste tu contraseña?</a>
      </div>
    </div>
  </div>
</div>
